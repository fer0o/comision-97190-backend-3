paths:
  /api/sessions/register:
    post:
      summary: Registra un nuevo usuario
      tags:
        - Sessions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - first_name
                - last_name
                - email
                - password
              properties:
                first_name:
                  type: string
                  example: Test
                last_name:
                  type: string
                  example: User
                email:
                  type: string
                  format: email
                  example: test.sessions@example.com
                password:
                  type: string
                  example: "123456"
      responses:
        "201":
          description: Usuario registrado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  payload:
                    type: object
                    properties:
                      _id:
                        type: string
                        example: 69f58f9327ba384b5ea21190
                      first_name:
                        type: string
                        example: Test
                      last_name:
                        type: string
                        example: User
                      email:
                        type: string
                        example: test.sessions@example.com
                      role:
                        type: string
                        example: user
                      phone:
                        type: string
                        example: ""
                      address:
                        type: string
                        example: ""
        "400":
          description: Datos incompletos o usuario existente
        "500":
          description: Error interno del servidor
  /api/sessions/login:
    post:
      summary: Inicia sesion de usuario
      tags:
        - Sessions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: test.sessions@example.com
                password:
                  type: string
                  example: "123456"
      responses:
        "200":
          description: Login exitoso
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  payload:
                    type: object
                    properties:
                      token:
                        type: string
                        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                      user:
                        type: object
                        properties:
                          _id:
                            type: string
                            example: 69f58f9327ba384b5ea21190
                          first_name:
                            type: string
                            example: Test
                          last_name:
                            type: string
                            example: User
                          email:
                            type: string
                            example: test.sessions@example.com
                          role:
                            type: string
                            example: user
                          phone:
                            type: string
                            example: ""
                          address:
                            type: string
                            example: ""
        "400":
          description: Credenciales incompletas
        "401":
          description: Credenciales invalidas
        "500":
          description: Error interno del servidor
  /api/sessions/current:
    get:
      summary: Obtiene el usuario autenticado actual
      description: Puede autenticarse con Authorization Bearer token o con cookie token.
      tags:
        - Sessions
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Usuario actual obtenido correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  payload:
                    type: object
                    properties:
                      _id:
                        type: string
                        example: 69f58f9327ba384b5ea21190
                      first_name:
                        type: string
                        example: Test
                      last_name:
                        type: string
                        example: User
                      email:
                        type: string
                        example: test.sessions@example.com
                      role:
                        type: string
                        example: user
                      phone:
                        type: string
                        example: ""
                      address:
                        type: string
                        example: ""
        "401":
          description: Token no enviado o invalido
        "404":
          description: Usuario no encontrado
        "500":
          description: Error interno del servidor
